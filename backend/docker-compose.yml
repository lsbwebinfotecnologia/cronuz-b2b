version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cronuz_b2b_db
    environment:
      POSTGRES_USER: cronuz_user
      POSTGRES_PASSWORD: cronuz_password
      POSTGRES_DB: cronuz_b2b
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
